<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f4f7f9; color: #334155; }
        .container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        
        /* 헤더 디자인 */
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 800; color: #0f172a; margin: 0; }
        .update-date { font-size: 13px; color: #94a3b8; font-weight: 500; }

        /* KPI 카드 디자인 */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .label { font-size: 13px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
        .val-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
        .current-val { font-size: 32px; font-weight: 800; color: #1e293b; }
        .unit { font-size: 14px; color: #94a3b8; font-weight: 500; }
        .change { font-size: 14px; font-weight: 700; border-radius: 6px; padding: 4px 10px; display: inline-flex; align-items: center; gap: 4px; }
        .up { color: #ef4444; background: #fef2f2; }
        .down { color: #3b82f6; background: #eff6ff; }

        /* 차트 컨트롤 섹션 */
        .chart-section { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; }
        .controls { display: flex; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .control-label { font-size: 12px; color: #94a3b8; font-weight: 700; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { border: 1px solid #e2e8f0; background: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; color: #475569; transition: 0.2s; }
        .btn.active { background: #1e293b; color: white; border-color: #1e293b; }
        canvas { width: 100% !important; height: 400px !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Energy Intelligence</h1>
            <div class="update-date" id="lastUpdate">Last data: --/--/--</div>
        </header>

        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="chart-section">
            <div class="controls">
                <div>
                    <div class="control-label">지표 선택</div>
                    <div id="indicatorBtns" class="btn-group"></div>
                </div>
                <div>
                    <div class="control-label">기간</div>
                    <div class="btn-group">
                        <button class="btn active" onclick="setRange('1M', this)">1M</button>
                        <button class="btn" onclick="setRange('3M', this)">3M</button>
                        <button class="btn" onclick="setRange('1Y', this)">1Y</button>
                        <button class="btn" onclick="setRange('MAX', this)">MAX</button>
                    </div>
                </div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11XokXCCeo2syVNWST98ULSjFhj-t2iTNLSBPPXCHxuQ/gviz/tq?tqx=out:csv&gid=0";

        let rawData = [], chart = null;
        let config = { range: '1M', indicator: 'Brent' };

        // [시니어 포인트] 파이썬 시트 리스트 순서(A~M) 인덱스 정의
        const metrics = {
            'Brent': { label: 'Brent Oil', idx: 1, unit: '$/bbl', color: '#ef4444' },
            'WTI':   { label: 'WTI Oil',   idx: 2, unit: '$/bbl', color: '#f59e0b' },
            'HH':    { label: 'Nat-Gas',   idx: 4, unit: '$/MMBtu', color: '#10b981' },
            'JKM':   { label: 'JKM LNG',   idx: 5, unit: '$/MMBtu', color: '#3b82f6' },
            'TTF':   { label: 'TTF LNG',   idx: 12, unit: '$/MMBtu', color: '#8b5cf6' },
            'SMP':   { label: 'SMP 가격',  idx: 11, unit: '원/kWh', color: '#6366f1' },
            'USD':   { label: '달러 환율', idx: 7, unit: '원/$', color: '#64748b' }
        };

        Papa.parse(CSV_URL, {
            download: true, header: false, // 헤더 이름 무시, 인덱스로 접근
            complete: (results) => {
                const rows = results.data.slice(1); // 헤더행 제외
                rawData = rows.map(r => {
                    let obj = { date: new Date(r[0]) };
                    Object.keys(metrics).forEach(k => {
                        const val = r[metrics[k].idx] ? r[metrics[k].idx].toString().replace(/,/g, '') : "";
                        const pVal = parseFloat(val);
                        // 0이거나 데이터 없으면 null 처리 (주말 방어)
                        obj[k] = (pVal > 0) ? pVal : null;
                    });
                    return obj;
                }).filter(d => !isNaN(d.date.getTime()));
                init();
            }
        });

        function init() {
            renderKPI();
            initIndicatorBtns();
            renderChart();
            document.getElementById('lastUpdate').innerText = `Last update: ${rawData[rawData.length-1].date.toLocaleDateString()}`;
        }

        function renderKPI() {
            const grid = document.getElementById('kpiGrid');
            const mainKeys = ['Brent', 'HH', 'JKM', 'USD']; // 상단 노출 4대 지표
            
            grid.innerHTML = mainKeys.map(key => {
                // [시니어 로직] 주말 null을 피해 가장 최근 유효 데이터 찾기
                let curIdx = rawData.length - 1;
                while (curIdx >= 0 && rawData[curIdx][key] === null) curIdx--;
                const cur = (curIdx >= 0) ? rawData[curIdx][key] : 0;

                let prevIdx = curIdx - 1;
                while (prevIdx >= 0 && rawData[prevIdx][key] === null) prevIdx--;
                const old = (prevIdx >= 0) ? rawData[prevIdx][key] : cur;

                const diff = cur - old;
                const pct = old !== 0 ? ((diff / old) * 100).toFixed(2) : "0.00";
                const isUp = diff >= 0;

                return `
                    <div class="card">
                        <div class="label">${metrics[key].label}</div>
                        <div class="val-row">
                            <span class="current-val">${(cur || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                            <span class="unit">${metrics[key].unit}</span>
                        </div>
                        <span class="change ${isUp ? 'up' : 'down'}">
                            ${isUp ? '▲' : '▼'} ${Math.abs(pct)}%
                        </span>
                    </div>
                `;
            }).join('');
        }

        function initIndicatorBtns() {
            const container = document.getElementById('indicatorBtns');
            Object.keys(metrics).forEach(k => {
                const b = document.createElement('button');
                b.className = 'btn' + (k === config.indicator ? ' active' : '');
                b.innerText = metrics[k].label;
                b.onclick = () => {
                    config.indicator = k;
                    document.querySelectorAll('#indicatorBtns .btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    renderChart();
                };
                container.appendChild(b);
            });
        }

        function setRange(range, el) {
            config.range = range;
            document.querySelectorAll('.btn-group:last-of-type .btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const filtered = filterData();
            const meta = metrics[config.indicator];
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(d => d.date),
                    datasets: [{
                        label: meta.label,
                        data: filtered.map(d => d[config.indicator]),
                        borderColor: meta.color,
                        backgroundColor: meta.color + '10',
                        fill: true, tension: 0.3, pointRadius: 0, borderWidth: 3, spanGaps: true
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { 
                            type: 'time', 
                            time: { unit: 'day', displayFormats: { day: 'M/d' } }, 
                            grid: { display: false },
                            ticks: { font: { size: 11, weight: 600 } }
                        },
                        y: { 
                            beginAtZero: false, 
                            grid: { color: '#f1f5f9' },
                            ticks: { 
                                callback: val => `${val}${meta.unit.split('/')[0]}`, // 단위 지능형 표기
                                font: { size: 11 }
                            }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function filterData() {
            const end = rawData[rawData.length - 1].date;
            let start = new Date(end);
            if (config.range === '1M') start.setMonth(end.getMonth() - 1);
            else if (config.range === '3M') start.setMonth(end.getMonth() - 3);
            else if (config.range === '1Y') start.setFullYear(end.getFullYear() - 1);
            else return rawData;
            return rawData.filter(d => d.date >= start);
        }
    </script>
</body>
</html>
