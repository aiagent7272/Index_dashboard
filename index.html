<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Market intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* Pretendard 폰트 및 기본 디자인 세팅 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f1f3f5; color: #343a40; }
        .container { max-width: 1300px; margin: auto; padding: 40px 20px; }
        
        /* 헤더 섹션 (오늘 날짜) */
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 26px; font-weight: 800; color: #0f172a; margin: 0; }
        .header-date { font-size: 14px; color: #868e96; font-weight: 500; }

        /* KPI 카드 그리드 디자인 (image_9.png 참고) */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); transition: 0.2s; border: 1px solid #f1f5f9; }
        .card:hover { transform: translateY(-3px); }
        .label { font-size: 13px; color: #868e96; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .val-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
        .current-val { font-size: 30px; font-weight: 800; color: #0f172a; }
        .unit { font-size: 14px; color: #bdc3c7; margin-left: -5px; }
        .change { font-size: 14px; font-weight: 700; border-radius: 6px; padding: 4px 10px; }
        .up { color: #e03131; background: #fff5f5; } /* 상승시 빨간색 */
        .down { color: #1971c2; background: #e7f5ff; } /* 하락시 파란색 */
        .change-sign { font-size: 12px; }

        /* 차트 섹션 디자인 (기간/지표 선택 컨트롤) */
        .chart-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 20px; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .btn { border: 1px solid #dee2e6; background: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #495057; }
        .btn.active { background: #343a40; color: white; border-color: #343a40; }
        .btn:not(.active):hover { background: #f8f9fa; }
        canvas { width: 100% !important; height: 450px !important; }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>Energy Intelligence Dashboard</h1>
            <div class="header-date" id="headerDate">게시 날짜: --/--/--</div>
        </header>

        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="chart-container">
            <div class="controls-row">
                <div class="control-group">
                    <div class="label">지표 전환</div>
                    <div id="indicatorBtns" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
                </div>
                <div class="control-group">
                    <div class="label">기간 선택</div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn active" onclick="setRange('1M')">1개월</button>
                        <button class="btn" onclick="setRange('3M')">3개월</button>
                        <button class="btn" onclick="setRange('1Y')">1년</button>
                        <button class="btn" onclick="setRange('MAX')">전체</button>
                    </div>
                </div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        // 시트 [웹 게시] CSV URL (중요: 반드시 본인 것으로 교체!)
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11XokXCCeo2syVNWST98ULSjFhj-t2iTNLSBPPXCHxuQ/gviz/tq?tqx=out:csv&gid=0";

        let rawData = [];
        let chartObj = null;
        let config = { range: '1M', indicator: 'Brent' };

        // 지표 메타데이터 정의 (님의 난리 난 헤더와 1:1 매칭)
        const metrics = {
            "Brent": { label: "Brent 유가", key: "Brent ($/bbl)", unit: "$/bbl", color: "#e03131" },
            "HH": { label: "HH 천연가스", key: "HH(Future) ($/MMBtu)", unit: "$/MMBtu", color: "#099268" },
            "JKM": { label: "JKM LNG", key: "JKM ($/MMBtu)", unit: "$/MMBtu", color: "#1971c2" },
            "TTF_USD": { label: "TTF 환산", key: "TTF ($/MMBtu)", unit: "$/MMBtu", color: "#d63384" },
            "SMP": { label: "SMP 육지", key: "SMP (/kWh)", unit: "원/kWh", color: "#6741d9" },
            "USD": { label: "원/달러 환율", key: "USD (/$)", unit: "원", color: "#495057" }
        };

        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: (results) => {
                const headers = Object.keys(results.data[0]);
                
                rawData = results.data.map(d => {
                    let obj = { date: new Date(d["Date"]) };
                    Object.keys(metrics).forEach(mKey => {
                        const sKey = metrics[mKey].key;
                        const val = d[sKey] ? d[sKey].toString().replace(/,/g, '').trim() : "0";
                        const parsedVal = parseFloat(val);
                        // [주말 방어] 값이 0이거나 숫자가 아니면 null 처리 (점 연결용)
                        obj[mKey] = (parsedVal > 0) ? parsedVal : null;
                    });
                    return obj;
                }).filter(d => d.date instanceof Date && !isNaN(d.date.getTime()));
                
                if (rawData.length > 0) initDashboard();
                else console.error("데이터 파싱 실패.");
            }
        });

        function initDashboard() {
            renderHeaderDate();
            renderKPI();
            initIndicatorBtns();
            updateChart();
        }

        // 헤더 날짜 출력 (오늘 데이터 기준)
        function renderHeaderDate() {
            const today = rawData[rawData.length - 1].date;
            document.getElementById('headerDate').innerText = `게시 날짜: ${today.toLocaleDateString()}`;
        }

        // KPI 카드 렌더링 (현재가 vs 어제 종가 비교)
        function renderKPI() {
            const grid = document.getElementById('kpiGrid');
            const today = rawData[rawData.length - 1];
            // 어제 데이터(이전 행)가 유효한지 체크
            const yesterday = rawData[rawData.length - 2] || today;
            
            // 4대 핵심 지표 카드 생성
            const displayKeys = ["Brent", "HH", "JKM", "USD"];
            
            grid.innerHTML = displayKeys.map(key => {
                const cur = today[key];
                const old = yesterday[key];
                const diff = cur - old;
                const pct = old !== 0 ? ((diff / old) * 100).toFixed(2) : "0.00";
                const isUp = diff >= 0;

                return `
                    <div class="card">
                        <div class="label">${metrics[key].label}</div>
                        <div class="val-row">
                            <span class="current-val">${cur.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                            <span class="unit">${metrics[key].unit}</span>
                        </div>
                        <span class="change ${isUp ? 'up' : 'down'}">
                            <span class="change-sign">${isUp ? '▲' : '▼'}</span> ${Math.abs(pct)}%
                        </span>
                    </div>
                `;
            }).join('');
        }

        function initIndicatorBtns() {
            const container = document.getElementById('indicatorBtns');
            container.innerHTML = Object.keys(metrics).map(key => `
                <button class="btn ${key === config.indicator ? 'active' : ''}" 
                        onclick="setIndicator('${key}')">${metrics[key].label}</button>
            `).join('');
        }

        function setRange(range) {
            config.range = range;
            document.querySelectorAll('.btn-group:last-of-type .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateChart();
        }

        function setIndicator(key) {
            config.indicator = key;
            document.querySelectorAll('#indicatorBtns .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const filtered = filterData();
            const meta = metrics[config.indicator];

            if (chartObj) chartObj.destroy();

            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(d => d.date),
                    datasets: [{
                        label: meta.label,
                        data: filtered.map(d => d[config.indicator]),
                        borderColor: meta.color,
                        backgroundColor: meta.color + '22',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        spanGaps: true // [주말 방어] null 구간은 그냥 선으로 이어버림
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'day', displayFormats: { day: 'M/d' } }, // [디테일] X축 날짜 1/25 형식
                            grid: { display: false }
                        },
                        y: {
                            beginAtZero: false,
                            grid: { color: '#f1f5f9' },
                            ticks: { callback: value => `$${value}` } // [디테일] Y축 수치 옆 단위($)
                        }
                    },
                    plugins: {
                        legend: { display: false } // 메트릭별 단일 차트라 범례 제거
                    }
                }
            });
        }

        function filterData() {
            const end = rawData[rawData.length - 1].date;
            let start = new Date(end);
            if (config.range === '1M') start.setMonth(end.getMonth() - 1);
            else if (config.range === '3M') start.setMonth(end.getMonth() - 3);
            else if (config.range === '1Y') start.setFullYear(end.getFullYear() - 1);
            else return rawData;
            return rawData.filter(d => d.date >= start);
        }
    </script>
</body>
</html>
