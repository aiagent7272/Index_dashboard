<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f8f9fa; color: #334155; }
        .container { max-width: 1300px; margin: auto; padding: 40px 20px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .label { font-size: 13px; color: #64748b; font-weight: 600; }
        .current-val { font-size: 32px; font-weight: 800; color: #0f172a; }
        .change { font-size: 14px; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
        .up { color: #ef4444; background: #fef2f2; }
        .down { color: #3b82f6; background: #eff6ff; }
        .chart-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn { border: 1px solid #e2e8f0; background: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn.active { background: #1e293b; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Energy Market intelligence</h1>
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="chart-container">
            <div id="btnContainer" class="btn-group"></div>
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11XokXCCeo2syVNWST98ULSjFhj-t2iTNLSBPPXCHxuQ/gviz/tq?tqx=out:csv&gid=0";
        let rawData = [], chart = null, currentKey = 'Brent';

        // 지표 정의 (헤더에 이 단어가 포함되면 낚아챔)
        const metrics = {
            'Brent': { label: 'Brent 유가', color: '#ef4444', unit: '$/bbl' },
            'JKM': { label: 'JKM LNG', color: '#3b82f6', unit: '$/MMBtu' },
            'SMP': { label: 'SMP 육지', color: '#6366f1', unit: '원/kWh' },
            'TTF': { label: 'TTF 환산', color: '#8b5cf6', unit: '$/MMBtu' }
        };

        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: (results) => {
                const headers = Object.keys(results.data[0]);
                console.log("실제 헤더:", headers);

                // 유연한 헤더 매핑 함수 (대소문자 무시, 포함 여부 확인)
                const findKey = (target) => headers.find(h => h.toLowerCase().includes(target.toLowerCase()));

                rawData = results.data.map(d => {
                    let obj = { date: new Date(d[findKey('Date')]) };
                    Object.keys(metrics).forEach(k => {
                        const actualKey = findKey(k);
                        const val = d[actualKey] ? d[actualKey].replace(/,/g, '') : "0";
                        obj[k] = parseFloat(val) || 0;
                    });
                    return obj;
                }).filter(d => !isNaN(d.date));

                init();
            }
        });

        function init() {
            renderKPI();
            const btns = document.getElementById('btnContainer');
            Object.keys(metrics).forEach(k => {
                const b = document.createElement('button');
                b.className = 'btn' + (k === currentKey ? ' active' : '');
                b.innerText = metrics[k].label;
                b.onclick = () => {
                    currentKey = k;
                    document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    renderChart();
                };
                btns.appendChild(b);
            });
            renderChart();
        }

        function renderKPI() {
            const grid = document.getElementById('kpiGrid');
            const latest = rawData[rawData.length - 1], prev = rawData[rawData.length - 2];
            grid.innerHTML = Object.keys(metrics).map(k => {
                const diff = latest[k] - prev[k], pct = ((diff / prev[k]) * 100).toFixed(2);
                return `<div class="card">
                    <div class="label">${metrics[k].label}</div>
                    <div class="current-val">${latest[k].toFixed(2)}</div>
                    <div class="change ${diff >= 0 ? 'up' : 'down'}">${diff >= 0 ? '▲' : '▼'} ${Math.abs(pct)}%</div>
                </div>`;
            }).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rawData.map(d => d.date),
                    datasets: [{
                        label: metrics[currentKey].label,
                        data: rawData.map(d => d[currentKey]),
                        borderColor: metrics[currentKey].color,
                        tension: 0.3, fill: false, pointRadius: 0
                    }]
                },
                options: {
                    scales: { x: { type: 'time', time: { unit: 'day' } } }
                }
            });
        }
    </script>
</body>
</html>
