<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에너지 지표 실시간 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f8f9fa; color: #334155; }
        .container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .label { font-size: 13px; color: #64748b; font-weight: 600; margin-bottom: 8px; }
        .val-row { display: flex; align-items: baseline; gap: 10px; }
        .current-val { font-size: 28px; font-weight: 800; color: #0f172a; }
        .change { font-size: 14px; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
        .up { color: #ef4444; background: #fef2f2; }
        .down { color: #3b82f6; background: #eff6ff; }
        .chart-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-group { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn { border: 1px solid #e2e8f0; background: white; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn.active { background: #1e293b; color: white; border-color: #1e293b; }
        canvas { width: 100% !important; height: 450px !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-weight: 800; margin-bottom: 30px;">📊 Energy Market Intelligence</h1>
        
        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="chart-container">
            <div class="label" style="margin-bottom: 12px;">지표 선택</div>
            <div id="indicatorBtns" class="btn-group"></div>
            <div class="label" style="margin-bottom: 12px;">기간 설정</div>
            <div class="btn-group">
                <button class="btn active" onclick="setRange('1M', this)">1개월</button>
                <button class="btn" onclick="setRange('3M', this)">3개월</button>
                <button class="btn" onclick="setRange('1Y', this)">1년</button>
                <button class="btn" onclick="setRange('MAX', this)">전체</button>
            </div>
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        // [필독] '웹에 게시' CSV URL을 넣어주세요
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11XokXCCeo2syVNWST98ULSjFhj-t2iTNLSBPPXCHxuQ/gviz/tq?tqx=out:csv&gid=0";

        let rawData = [];
        let chart = null;
        let config = { range: '1M', indicator: 'Brent' };

        // [시니어 포인트] 파이썬 시트 순서(Index) 기반으로 지표 정의
        const metrics = {
            'Brent': { label: 'Brent 유가', idx: 1, unit: '$/bbl', color: '#ef4444' },
            'JKM': { label: 'JKM LNG', idx: 5, unit: '$/MMBtu', color: '#3b82f6' },
            'TTF_EUR': { label: 'TTF 원본(G)', idx: 6, unit: '€/MWh', color: '#868e96' },
            'SMP': { label: 'SMP 육지', idx: 11, unit: '원/kWh', color: '#6366f1' },
            'TTF_USD': { label: 'TTF 환산(M)', idx: 12, unit: '$/MMBtu', color: '#8b5cf6' }
        };

        Papa.parse(CSV_URL, {
            download: true, header: false, // 헤더 이름 무시, 인덱스로 접근
            complete: (results) => {
                const rows = results.data.slice(1); // 첫 줄(헤더) 제외
                rawData = rows.map(r => {
                    let obj = { date: new Date(r[0]) };
                    Object.keys(metrics).forEach(k => {
                        const val = r[metrics[k].idx] ? r[metrics[k].idx].replace(/,/g, '') : "0";
                        obj[k] = parseFloat(val) || 0;
                    });
                    return obj;
                }).filter(d => !isNaN(d.date));

                init();
            }
        });

        function init() {
            renderKPI();
            initBtns();
            renderChart();
        }

        function renderKPI() {
            const grid = document.getElementById('kpiGrid');
            const latest = rawData[rawData.length - 1];
            const prev = rawData[rawData.length - 2] || latest;
            
            // 카드에 보여줄 4대 핵심 지표
            const mainKeys = ['Brent', 'JKM', 'SMP', 'TTF_USD'];
            
            grid.innerHTML = mainKeys.map(k => {
                const diff = latest[k] - prev[k];
                const pct = prev[k] !== 0 ? ((diff / prev[k]) * 100).toFixed(2) : 0;
                return `
                    <div class="card">
                        <div class="label">${metrics[k].label}</div>
                        <div class="val-row">
                            <span class="current-val">${latest[k].toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                            <span class="change ${diff >= 0 ? 'up' : 'down'}">${diff >= 0 ? '▲' : '▼'} ${Math.abs(pct)}%</span>
                        </div>
                        <div style="font-size: 12px; color: #94a3b8; margin-top: 8px;">단위: ${metrics[k].unit}</div>
                    </div>
                `;
            }).join('');
        }

        function initBtns() {
            const container = document.getElementById('indicatorBtns');
            Object.keys(metrics).forEach(k => {
                const b = document.createElement('button');
                b.className = 'btn' + (k === config.indicator ? ' active' : '');
                b.innerText = metrics[k].label;
                b.onclick = () => {
                    config.indicator = k;
                    document.querySelectorAll('#indicatorBtns .btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    renderChart();
                };
                container.appendChild(b);
            });
        }

        function setRange(range, el) {
            config.range = range;
            document.querySelectorAll('.btn-group:last-of-type .btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const filtered = filterData();
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(d => d.date),
                    datasets: [{
                        label: metrics[config.indicator].label,
                        data: filtered.map(d => d[config.indicator]),
                        borderColor: metrics[config.indicator].color,
                        backgroundColor: metrics[config.indicator].color + '15',
                        fill: true, tension: 0.3, pointRadius: 0, borderWidth: 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', time: { unit: 'day' }, grid: { display: false } },
                        y: { beginAtZero: false, grid: { color: '#f1f5f9' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function filterData() {
            const end = rawData[rawData.length - 1].date;
            let start = new Date(end);
            if (config.range === '1M') start.setMonth(end.getMonth() - 1);
            else if (config.range === '3M') start.setMonth(end.getMonth() - 3);
            else if (config.range === '1Y') start.setFullYear(end.getFullYear() - 1);
            else return rawData;
            return rawData.filter(d => d.date >= start);
        }
    </script>
</body>
</html>
