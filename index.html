<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에너지 시장 통합 대시보드</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #f1f3f5; color: #343a40; }
        .container { max-width: 1300px; margin: auto; padding: 40px 20px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); }
        .label { font-size: 13px; color: #868e96; font-weight: 600; margin-bottom: 8px; }
        .val-row { display: flex; align-items: baseline; gap: 10px; }
        .current-val { font-size: 32px; font-weight: 800; }
        .change { font-size: 15px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .up { color: #e03131; background: #fff5f5; }
        .down { color: #1971c2; background: #e7f5ff; }
        .chart-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04); }
        .controls { display: flex; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: 1px solid #dee2e6; background: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn.active { background: #343a40; color: white; border-color: #343a40; }
        canvas { width: 100% !important; height: 450px !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Energy Intelligence Dashboard</h1>
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="chart-container">
            <div class="controls">
                <div>
                    <div class="label">기간 선택</div>
                    <div class="btn-group" id="rangeBtns">
                        <button class="btn active" onclick="setRange('1M')">1개월</button>
                        <button class="btn" onclick="setRange('3M')">3개월</button>
                        <button class="btn" onclick="setRange('1Y')">1년</button>
                        <button class="btn" onclick="setRange('MAX')">전체</button>
                    </div>
                </div>
                <div>
                    <div class="label">지표 전환</div>
                    <div class="btn-group" id="indicatorBtns"></div>
                </div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11XokXCCeo2syVNWST98ULSjFhj-t2iTNLSBPPXCHxuQ/gviz/tq?tqx=out:csv&gid=0";

        let rawData = [];
        let chartObj = null;
        let config = { range: '1M', indicator: 'Brent' };

        // [핵심] 이미지(image_9b4c82.png)에 나타난 실제 헤더와 1:1 매칭
        // 깨진 글자 '(/쥰쥰)'까지 똑같이 맞춰야 데이터가 들어옵니다.
        const metrics = {
            "Brent": { label: "Brent 유가", key: "Brent ($/bbl)", unit: "$/bbl", color: "#e03131" },
            "WTI": { label: "WTI 유가", key: "WTI ($/bbl)", unit: "$/bbl", color: "#f08c00" },
            "HH_Spot": { label: "HH(Spot)", key: "HH(Spot) ($/MMBtu)", unit: "$/MMBtu", color: "#099268" },
            "HH_Future": { label: "HH(Future)", key: "HH(Future) ($/MMBtu)", unit: "$/MMBtu", color: "#20bf6b" },
            "JKM": { label: "JKM LNG", key: "JKM ($/MMBtu)", unit: "$/MMBtu", color: "#1971c2" },
            "TTF_Raw": { label: "TTF 원본", key: "TTF (/MWh)", unit: "€/MWh", color: "#495057" },
            "USD": { label: "USD 환율", key: "USD (/$)", unit: "원", color: "#4b7bec" },
            "SMP": { label: "SMP 육지", key: "SMP (/kWh)", unit: "원/kWh", color: "#6741d9" },
            "TTF_Converted": { label: "TTF 환산", key: "TTF ($/MMBtu)", unit: "$/MMBtu", color: "#d63384" }
        };

        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: (results) => {
                console.log("실제 감지된 헤더:", Object.keys(results.data[0])); // 디버깅용
                
                rawData = results.data.map(d => {
                    let obj = { date: new Date(d["Date"]) };
                    Object.keys(metrics).forEach(mKey => {
                        const sheetKey = metrics[mKey].key;
                        const val = d[sheetKey] ? d[sheetKey].toString().replace(/,/g, '').trim() : "0";
                        obj[mKey] = parseFloat(val) || 0;
                    });
                    return obj;
                }).filter(d => d.date instanceof Date && !isNaN(d.date.getTime()));
                
                if (rawData.length > 0) initDashboard();
                else document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>데이터 파싱 실패 (헤더 불일치 가능성)</h2>";
            }
        });

        function initDashboard() {
            renderKPI();
            initIndicatorBtns();
            updateChart();
        }

        function renderKPI() {
            const grid = document.getElementById('kpiGrid');
            const latest = rawData[rawData.length - 1];
            const prev = rawData[rawData.length - 2] || latest;
            const displayKeys = ["Brent", "JKM", "SMP", "TTF_Converted"];
            
            grid.innerHTML = displayKeys.map(key => {
                const cur = latest[key];
                const old = prev[key];
                const diff = cur - old;
                const pct = old !== 0 ? ((diff / old) * 100).toFixed(2) : "0.00";
                const isUp = diff >= 0;

                return `
                    <div class="card">
                        <div class="label">${metrics[key].label}</div>
                        <div class="val-row">
                            <span class="current-val">${cur.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                            <span class="change ${isUp ? 'up' : 'down'}">
                                ${isUp ? '▲' : '▼'} ${Math.abs(pct)}%
                            </span>
                        </div>
                        <div class="sub-info">전일 대비 ${Math.abs(diff).toFixed(2)} ${metrics[key].unit}</div>
                    </div>
                `;
            }).join('');
        }

        function initIndicatorBtns() {
            const container = document.getElementById('indicatorBtns');
            container.innerHTML = Object.keys(metrics).map(key => `
                <button class="btn ${key === config.indicator ? 'active' : ''}" 
                        onclick="setIndicator('${key}')">${metrics[key].label}</button>
            `).join('');
        }

        function setRange(range) {
            config.range = range;
            document.querySelectorAll('#rangeBtns .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateChart();
        }

        function setIndicator(key) {
            config.indicator = key;
            document.querySelectorAll('#indicatorBtns .btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const filtered = filterData();
            const meta = metrics[config.indicator];

            if (chartObj) chartObj.destroy();

            chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(d => d.date),
                    datasets: [{
                        label: meta.label,
                        data: filtered.map(d => d[config.indicator]),
                        borderColor: meta.color,
                        backgroundColor: meta.color + '22',
                        fill: true, tension: 0.3, borderWidth: 3, pointRadius: 0, pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', time: { unit: 'day' }, grid: { display: false } },
                        y: { beginAtZero: false, grid: { color: '#f1f3f5' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function filterData() {
            const end = rawData[rawData.length - 1].date;
            let start = new Date(end);
            if (config.range === '1M') start.setMonth(end.getMonth() - 1);
            else if (config.range === '3M') start.setMonth(end.getMonth() - 3);
            else if (config.range === '1Y') start.setFullYear(end.getFullYear() - 1);
            else return rawData;
            return rawData.filter(d => d.date >= start);
        }
    </script>
</body>
</html>
